<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGB | SISTEMA RESPONSIVO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --shv-brand: #d33100; --shv-black: #0d0d0d; }
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Ajustes para Mobile */
        #login-overlay { position: fixed; inset: 0; background: var(--shv-black); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .login-card { background: white; padding: 2rem; border-radius: 2.5rem; width: 100%; max-width: 400px; text-align: center; }
        
        .sgb-logo-box { background-color: var(--shv-brand); color: white; display: inline-block; padding: 10px 30px; border-radius: 15px; font-size: 2.5rem; font-weight: 900; font-style: italic; line-height: 1; margin-bottom: 1rem; }
        
        .input-group { margin-bottom: 1.2rem; border-bottom: 2px solid #f1f5f9; transition: border-color 0.3s; }
        .input-group:focus-within { border-color: var(--shv-brand); }
        .custom-input { width: 100%; padding: 12px 5px; border: none; background: transparent; font-size: 16px; outline: none; }
        
        .btn-acao { background-color: black; color: white; width: 100%; padding: 16px; border-radius: 18px; font-weight: 800; text-transform: uppercase; font-size: 13px; transition: transform 0.2s; }
        .btn-acao:active { transform: scale(0.98); }

        /* Canvas de Assinatura Responsivo */
        #sig-canvas { touch-action: none; cursor: crosshair; width: 100%; height: 180px; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 1rem; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: center; justify-content: center; padding: 15px; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div id="login-overlay">
        <div class="login-card shadow-2xl">
            <div class="sgb-logo-box">SGB</div>
            <h2 class="text-slate-800 font-black text-lg uppercase tracking-tighter mb-6">Carta de Circularização</h2>
            <div class="space-y-4">
                <div class="text-left">
                    <span class="text-[10px] font-black text-slate-400 uppercase ml-1">CNPJ do Cliente</span>
                    <div class="input-group"><input type="text" id="user-login" placeholder="00.000.000/0000-00" class="custom-input"></div>
                </div>
                <div class="text-left">
                    <span class="text-[10px] font-black text-slate-400 uppercase ml-1">Senha de Acesso</span>
                    <div class="input-group"><input type="password" id="pass-login" placeholder="••••••••" class="custom-input"></div>
                </div>
                <label class="flex items-start gap-3 cursor-pointer text-left mb-6">
                    <input type="checkbox" id="lgpd-check" class="mt-1 w-5 h-5 accent-[#d33100]">
                    <span class="text-[10px] text-slate-500 font-bold uppercase leading-tight">Aceito os termos da LGPD e autorizo o uso dos dados.</span>
                </label>
                <button onclick="handleLogin()" class="btn-acao">Acessar Sistema</button>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden min-h-screen flex flex-col">
        <header class="bg-black text-white p-4 sticky top-0 z-50 border-b-4 border-shv-brand shadow-lg">
            <div class="container mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-lg font-black italic uppercase">Gestão <span class="text-shv-brand">SGB</span></h1>
                    <p id="header-user-name" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest"></p>
                </div>
                <button onclick="logout()" class="bg-shv-brand px-4 py-2 rounded-xl text-[10px] font-black uppercase">Sair</button>
            </div>
        </header>

        <main class="container mx-auto py-6 px-4 flex-grow">
            <section id="admin-section" class="hidden space-y-6">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-5 rounded-3xl shadow-sm border">
                    <h2 class="font-black uppercase text-sm">Painel de Controle</h2>
                    <label class="w-full md:w-auto bg-black text-white px-6 py-4 rounded-2xl font-black text-xs uppercase text-center cursor-pointer">
                        Importar Planilha Excel
                        <input type="file" class="hidden" accept=".xlsx, .xls" onchange="importarExcel(this)">
                    </label>
                </div>

                <div class="bg-white rounded-3xl shadow-xl overflow-hidden border">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-900 text-white text-[10px] font-black uppercase">
                                <tr>
                                    <th class="p-5">Empresa / CNPJ</th>
                                    <th class="p-5 text-center">Status</th>
                                    <th class="p-5 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body" class="divide-y text-xs"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="user-section" class="hidden space-y-6">
                <div class="flex items-center gap-2 border-l-4 border-shv-brand pl-3">
                    <h2 class="font-black uppercase text-sm">Conferências Disponíveis</h2>
                </div>
                <div id="user-cards-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </section>
        </main>
        
        <footer class="p-6 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest">
            Desenvolvido por dualdevs-tech &copy; 2026
        </footer>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('sgb_db_v20')) || [];
        let users = JSON.parse(localStorage.getItem('sgb_users_v20')) || [{ cnpj: 'shv', nome: 'Administrador Geral', pass: 'shv', role: 'admin' }];

        // LÓGICA DE LOGIN
        function handleLogin() {
            const input = document.getElementById('user-login').value.trim();
            const u = input === 'shv' ? 'shv' : input.replace(/\D/g, "");
            const p = document.getElementById('pass-login').value.trim();
            
            if(!document.getElementById('lgpd-check').checked) {
                alert("É necessário aceitar os termos da LGPD.");
                return;
            }

            const user = users.find(x => x.cnpj === u && x.pass === p);
            if(user) {
                sessionStorage.setItem('logged_user', JSON.stringify(user));
                initApp();
            } else {
                alert("Dados de acesso inválidos.");
            }
        }

        function initApp() {
            const user = JSON.parse(sessionStorage.getItem('logged_user'));
            if(!user) return;

            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('header-user-name').innerText = user.nome;

            if(user.role === 'admin') {
                renderAdminTable();
                document.getElementById('admin-section').classList.remove('hidden');
            } else {
                renderUserSection(user.cnpj);
                document.getElementById('user-section').classList.remove('hidden');
            }
        }

        // IMPORTAÇÃO (MAPEAMENTO SEGURO)
        function importarExcel(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });

                    rows.forEach(row => {
                        const cnpjLimpo = String(row.CNPJ || "").replace(/\D/g, "");
                        const nomeEmpresa = row.NOME || "Cliente Sem Nome";

                        if (!cnpjLimpo) return;

                        // Cadastro automático de usuário
                        if(!users.find(u => u.cnpj === cnpjLimpo)) {
                            users.push({ cnpj: cnpjLimpo, nome: nomeEmpresa, pass: cnpjLimpo.slice(0,4), role: 'user' });
                        }

                        db.push({
                            id: Date.now() + Math.random(),
                            terceiro: nomeEmpresa,
                            cnpj: cnpjLimpo,
                            unidade: row.UNIDADE || "Matriz",
                            p13: row.P13 || 0,
                            p20: row.P20 || 0,
                            p45: row.P45 || 0,
                            granel: row.GRANEL || 0,
                            status: 'Pendente',
                            dataImport: new Date().toLocaleDateString()
                        });
                    });
                    saveData(); renderAdminTable(); alert("Dados importados!");
                } catch (err) { alert("Erro ao processar arquivo."); }
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        function renderAdminTable() {
            const body = document.getElementById('admin-table-body');
            body.innerHTML = db.map(i => `
                <tr class="hover:bg-slate-50">
                    <td class="p-5">
                        <div class="font-bold text-slate-900">${i.terceiro}</div>
                        <div class="text-[9px] font-mono text-slate-400">${i.cnpj}</div>
                    </td>
                    <td class="p-5 text-center">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${i.status === 'Assinado' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
                            ${i.status}
                        </span>
                    </td>
                    <td class="p-5 text-right">
                        <button onclick="deleteRecord(${i.id})" class="text-red-500 font-black text-[9px] uppercase">Excluir</button>
                    </td>
                </tr>`).join('');
        }

        function renderUserSection(cnpj) {
            const container = document.getElementById('user-cards-container');
            const filtrados = db.filter(i => i.cnpj === cnpj);
            
            if(filtrados.length === 0) {
                container.innerHTML = `<div class="col-span-full py-10 text-center text-slate-400 font-bold uppercase text-xs italic">Nenhuma pendência encontrada.</div>`;
                return;
            }

            container.innerHTML = filtrados.map(i => `
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-t-8 border-shv-brand flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-slate-100 px-3 py-1 rounded-lg text-[9px] font-black uppercase text-slate-500">${i.unidade}</span>
                            <span class="text-[9px] font-bold text-slate-300 italic">${i.dataImport}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <p class="text-[8px] text-slate-400 font-black uppercase">P13</p>
                                <p class="text-lg font-black">${i.p13}</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <p class="text-[8px] text-slate-400 font-black uppercase">P20</p>
                                <p class="text-lg font-black">${i.p20}</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <p class="text-[8px] text-slate-400 font-black uppercase">P45</p>
                                <p class="text-lg font-black">${i.p45}</p>
                            </div>
                            <div class="bg-orange-50 p-3 rounded-2xl border border-orange-100">
                                <p class="text-[8px] text-orange-400 font-black uppercase text-shv-brand">Granel (KG)</p>
                                <p class="text-lg font-black text-shv-brand">${i.granel}</p>
                            </div>
                        </div>
                    </div>
                    <button class="btn-acao">Validar Recebimento</button>
                </div>`).join('');
        }

        function saveData() {
            localStorage.setItem('sgb_db_v20', JSON.stringify(db));
            localStorage.setItem('sgb_users_v20', JSON.stringify(users));
        }

        function deleteRecord(id) { if(confirm("Deseja apagar este registro?")) { db = db.filter(x => x.id !== id); saveData(); renderAdminTable(); } }
        function logout() { sessionStorage.clear(); location.reload(); }
        
        window.onload = initApp;
    </script>
</body>
</html>
